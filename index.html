<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler Design Quiz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.quiz-container{
    width:100%;
    max-width:800px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

#progress{
    text-align:right;
    color:#666;
    font-weight:bold;
    margin-bottom:15px;
}

#question{
    font-size:1.3rem;
    font-weight:bold;
    margin-bottom:20px;
    line-height:1.5;
}

.option{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#f0f0f0;
    text-align:left;
    cursor:pointer;
    font-size:1rem;
    transition:0.3s;
}

.option:hover{
    background:#ddd;
}

.option:disabled{
    cursor:not-allowed;
}

#feedback{
    margin-top:15px;
    font-size:1.1rem;
    line-height:1.6;
}

#nextBtn{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
}

#nextBtn:hover{
    background:#0056b3;
}

#result{
    text-align:center;
}

.score-card{
    padding:20px;
}

.score-card h2{
    color:#28a745;
    margin-bottom:20px;
}

.score-card p{
    font-size:1.2rem;
    margin:10px 0;
}

/* Tablet */
@media(max-width:768px){

    .quiz-container{
        padding:20px;
    }

    h1{
        font-size:1.8rem;
    }

    #question{
        font-size:1.15rem;
    }
}

/* Mobile */
@media(max-width:480px){

    .quiz-container{
        padding:15px;
    }

    h1{
        font-size:1.4rem;
    }

    #question{
        font-size:1rem;
    }

    .option{
        font-size:0.95rem;
        padding:12px;
    }

    #nextBtn{
        padding:12px;
        font-size:0.95rem;
    }
}
</style>
</head>
<body>

<div class="quiz-container">

    <h1>Compiler Design Quiz</h1>

    <div id="quiz">

        <div id="progress"></div>

        <div id="question">Loading...</div>

        <div id="options"></div>

        <button id="nextBtn">Next Question</button>

    </div>

    <div id="result" style="display:none;"></div>

</div>

<script>

let quizData = [];
let currentQuestion = 0;
let score = 0;
let answered = false;

fetch("questions.json")
.then(response => response.json())
.then(data => {
    quizData = data.quiz;
    loadQuestion();
})
.catch(error => {
    document.getElementById("question").innerHTML =
        "Failed to load questions.json";
    console.error(error);
});

function loadQuestion(){

    answered = false;

    const q = quizData[currentQuestion];

    document.getElementById("progress").innerHTML =
        `Question ${currentQuestion + 1} of ${quizData.length}`;

    document.getElementById("question").innerHTML =
        q.question;

    const optionsDiv =
        document.getElementById("options");

    optionsDiv.innerHTML = "";

    q.options.forEach(option => {

        const btn =
            document.createElement("button");

        btn.classList.add("option");

        btn.innerText = option;

        btn.onclick = () =>
            checkAnswer(btn, option);

        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(button, selectedOption){

    if(answered) return;

    answered = true;

    const q = quizData[currentQuestion];

    const buttons =
        document.querySelectorAll(".option");

    buttons.forEach(btn => {

        btn.disabled = true;

        if(btn.innerText === q.answer){

            btn.style.background = "#28a745";
            btn.style.color = "white";
        }

        if(
            btn.innerText === selectedOption &&
            selectedOption !== q.answer
        ){
            btn.style.background = "#dc3545";
            btn.style.color = "white";
        }
    });

    const feedback =
        document.createElement("div");

    feedback.id = "feedback";

    if(selectedOption === q.answer){

        score++;

        feedback.innerHTML =
            "Correct Answer";

        feedback.style.color = "green";
    }
    else{

        feedback.innerHTML =
            `Wrong Answer<br><br>
             Correct Answer:
             <strong>${q.answer}</strong>`;

        feedback.style.color = "red";
    }

    document
        .getElementById("options")
        .appendChild(feedback);
}

document
.getElementById("nextBtn")
.addEventListener("click", () => {

    if(!answered){

        alert("Please select an answer!");

        return;
    }

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();
    }
    else{

        showResult();
    }
});

function showResult(){

    document
        .getElementById("quiz")
        .style.display = "none";

    const percentage =
        ((score / quizData.length) * 100)
        .toFixed(2);

    document
        .getElementById("result")
        .style.display = "block";

    document
        .getElementById("result")
        .innerHTML = `
        <div class="score-card">
            <h2>Quiz Completed</h2>

            <p><strong>Total Questions:</strong>
            ${quizData.length}</p>

            <p><strong>Correct Answers:</strong>
            ${score}</p>

            <p><strong>Wrong Answers:</strong>
            ${quizData.length - score}</p>

            <p><strong>Percentage:</strong>
            ${percentage}%</p>
        </div>
    `;
}

</script>

</body>
</html>
